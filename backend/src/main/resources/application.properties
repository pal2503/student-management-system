# Server Port
server.port=8081

# Spring Data JPA Configuration (H2 In-Memory Database for development/testing)
spring.datasource.url=jdbc:h2:mem:studentdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Web Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Show SQL queries in the logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Automatically update the database schema
spring.jpa.hibernate.ddl-auto=update

# Logging levels
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
